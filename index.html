<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Duel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Страница входа -->
  <div id="login-page" class="page active">
    <h1>Memory Duel</h1>
    <input type="text" id="username" placeholder="Введите имя">
    <button id="loginBtn">Войти</button>
    <button id="registerBtn">Регистрация</button>
  </div>

  <!-- Личная страница -->
  <div id="profile-page" class="page">
    <h2>Привет, <span id="playerName"></span>!</h2>
    <p>Твой рейтинг: <span id="playerRating">0</span></p>
    <button id="playBtn">Играть</button>
    <button id="logoutBtn">Выйти</button>
  </div>

  <!-- Лобби -->
  <div id="lobby-page" class="page">
    <h2>Выбор стола</h2>
    <button id="createGameBtn">Создать стол</button>
    <h3>Доступные столы</h3>
    <ul id="gamesList"></ul>
    <button id="backToProfile">Назад</button>
  </div>

  <!-- Игровое поле -->
  <div id="game-page" class="page">
    <div id="game-header">
      <div class="player-score" id="player1">
        Игрок 1: <span id="score1">0</span>
      </div>
      <div class="player-score" id="player2">
        Игрок 2: <span id="score2">0</span>
      </div>
    </div>
    <div id="game-board"></div>
    <button id="exitGame">Выйти из игры</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
