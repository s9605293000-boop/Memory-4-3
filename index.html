<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Memory Duel</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Memory Duel</h1>

  <!-- Вход -->
  <div id="login-page">
    <h2>Вход</h2>
    <input type="text" id="login-email" placeholder="Email" />
    <input type="password" id="login-password" placeholder="Пароль" />
    <button onclick="login()">Войти</button>
    <p>Нет аккаунта? <a href="#" onclick="showRegister()">Регистрация</a></p>
  </div>

  <!-- Регистрация -->
  <div id="register-page" style="display:none;">
    <h2>Регистрация</h2>
    <input type="text" id="register-email" placeholder="Email" />
    <input type="password" id="register-password" placeholder="Пароль" />
    <button onclick="register()">Зарегистрироваться</button>
    <p>Уже есть аккаунт? <a href="#" onclick="showLogin()">Войти</a></p>
  </div>

  <!-- Лобби -->
  <div id="lobby-page" style="display:none;">
    <h2>Лобби</h2>
    <button onclick="createRoom()">Создать стол</button>
    <div id="rooms-list"></div>
  </div>

  <!-- Игра -->
  <div id="game-page" style="display:none;">
    <h2>Игра Memory Duel</h2>

    <div id="level-buttons">
      <button data-cards="12" onclick="startGame(12)">Уровень A (4×3)</button>
      <button data-cards="16" onclick="startGame(16)">Уровень B (4×4)</button>
      <button data-cards="24" onclick="startGame(24)">Уровень C (4×6)</button>
    </div>

    <div id="game-board" aria-live="polite"></div>

    <button class="secondary" onclick="exitGame()">Выйти в лобби</button>
  </div>

  <script src="main.js"></script>
</body>
</html>
