<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Memory Duel</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>Memory Duel</h1>

  <!-- Вход -->
  <div id="login-page">
    <h2>Вход</h2>
    <input id="login-email" type="text" placeholder="Email" />
    <input id="login-password" type="password" placeholder="Пароль" />
    <button onclick="login()">Войти</button>
    <p>Нет аккаунта? <a href="#" onclick="showRegister()">Регистрация</a></p>
  </div>

  <!-- Регистрация -->
  <div id="register-page" style="display:none">
    <h2>Регистрация</h2>
    <input id="register-email" type="text" placeholder="Email" />
    <input id="register-password" type="password" placeholder="Пароль" />
    <button onclick="register()">Зарегистрироваться</button>
    <p>Уже есть аккаунт? <a href="#" onclick="showLogin()">Войти</a></p>
  </div>

  <!-- Лобби -->
  <div id="lobby-page" style="display:none">
    <h2>Лобби</h2>

    <label for="level-select">Выбери уровень:</label>
    <select id="level-select">
      <option value="12">4 × 3 (12 карт)</option>
      <option value="16">4 × 4 (16 карт)</option>
      <option value="24">4 × 6 (24 карты)</option>
    </select>

    <div class="actions">
      <button onclick="createRoom()">Создать стол</button>
    </div>

    <div id="rooms-list"></div>
  </div>

  <!-- Игра -->
  <div id="game-page" style="display:none">
    <h2>Игра Memory Duel</h2>
    <div id="game-board" class="grid-4cols"></div>
    <button onclick="exitGame()">Выйти в лобби</button>
  </div>

  <script src="main.js"></script>
</body>
</html>
