<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Memory Duel</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1 class="app-title">Memory Duel</h1>

  <!-- Вход -->
  <div id="login-page" class="page">
    <h2>Вход</h2>
    <input id="login-email" type="text" placeholder="Email" />
    <input id="login-password" type="password" placeholder="Пароль" />
    <button class="btn" onclick="login()">Войти</button>
    <p class="muted">Нет аккаунта? <a href="#" onclick="showRegister()">Регистрация</a></p>
  </div>

  <!-- Регистрация -->
  <div id="register-page" class="page" style="display:none">
    <h2>Регистрация</h2>
    <input id="register-email" type="text" placeholder="Email" />
    <input id="register-password" type="password" placeholder="Пароль" />
    <button class="btn" onclick="register()">Зарегистрироваться</button>
    <p class="muted">Уже есть аккаунт? <a href="#" onclick="showLogin()">Войти</a></p>
  </div>

  <!-- Лобби -->
  <div id="lobby-page" class="page" style="display:none">
    <h2>Лобби</h2>
    <div class="row">
      <button class="btn" onclick="createRoom()">Создать стол</button>
    </div>

    <div class="levels">
      <span>Уровень:</span>
      <button class="chip" data-rows="3" data-cols="4" onclick="selectLevel(this)">A (4×3)</button>
      <button class="chip" data-rows="4" data-cols="4" onclick="selectLevel(this)">B (4×4)</button>
      <button class="chip" data-rows="4" data-cols="6" onclick="selectLevel(this)">C (4×6)</button>
    </div>

    <div id="rooms-list" class="list"></div>
  </div>

  <!-- Игра -->
  <div id="game-page" class="page" style="display:none">
    <h2>Игра Memory Duel</h2>

    <div class="levels small">
      <span>Уровень:</span>
      <button class="chip" data-rows="3" data-cols="4" onclick="rebuildFromChip(this)">A</button>
      <button class="chip" data-rows="4" data-cols="4" onclick="rebuildFromChip(this)">B</button>
      <button class="chip" data-rows="4" data-cols="6" onclick="rebuildFromChip(this)">C</button>
    </div>

    <div id="game-board" class="board"></div>

    <div class="row">
      <button class="btn secondary" onclick="exitGame()">Выйти в лобби</button>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
