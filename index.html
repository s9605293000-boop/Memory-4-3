<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Duel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Memory Duel</h1>

  <!-- Страница входа -->
  <div id="login-page" class="page active">
    <h2>Вход</h2>
    <input type="text" id="username" placeholder="Введите имя">
    <button onclick="login()">Войти</button>
    <button onclick="register()">Регистрация</button>
  </div>

  <!-- Лобби -->
  <div id="lobby-page" class="page">
    <h2 id="welcome"></h2>
    <p>Твой рейтинг: <span id="rating">0</span></p>
    <button onclick="logout()">Выйти</button>
    <h3>Выбор стола</h3>
    <button onclick="createTable()">Создать стол</button>
    <div id="tables"></div>
  </div>

  <!-- Игровая страница -->
  <div id="game-page" class="page">
    <h2>Игра</h2>
    <div id="scores">
      Игрок 1: <span id="score1">0</span> | 
      Игрок 2: <span id="score2">0</span>
    </div>
    <div id="game-board"></div>
    <button onclick="backToLobby()">Назад</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
